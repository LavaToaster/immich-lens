name: Release tvOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 1.2.0). Defaults to tag or project setting.'
        required: false
        type: string

jobs:
  release-tvos:
    name: Archive & Upload to TestFlight
    runs-on: macos-26
    env:
      ARCHIVE_PATH: build/ImmichLens-tvOS.xcarchive
      EXPORT_PATH: build/export
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Derive version info
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
            VERSION="${VERSION#v}"
            VERSION="${VERSION%%-*}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            VERSION="${VERSION%%-*}"
          else
            VERSION=$(sed -n 's/.*MARKETING_VERSION = \(.*\);/\1/p' ImmichLens.xcodeproj/project.pbxproj | head -1 | tr -d ' ')
          fi

          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "### Version Info" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Marketing version:** $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build number:** $BUILD_NUMBER" >> "$GITHUB_STEP_SUMMARY"

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}

      - name: Set up App Store Connect API key
        env:
          API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Archive
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.marketing_version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project ImmichLens.xcodeproj \
            -scheme ImmichLens \
            -destination 'generic/platform=tvOS' \
            -archivePath "$ARCHIVE_PATH" \
            -skipPackagePluginValidation \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            DEVELOPMENT_TEAM=PV3AE7C4X7 2>&1 | xcbeautify

      - name: Generate ExportOptions.plist
        run: |
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>export</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>PV3AE7C4X7</string>
          </dict>
          </plist>
          PLIST

      - name: Export archive
        env:
          API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" 2>&1 | xcbeautify

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --file build/export/ImmichLens.ipa \
            --type appletvos \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
